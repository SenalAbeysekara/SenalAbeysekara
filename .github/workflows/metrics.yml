name: GitHub Analytics Cards

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate analytics SVG
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USERNAME: SenalAbeysekara
        run: python .github/scripts/generate_analytics.py

      - name: Commit analytics SVG
        run: |
          if [[ -n $(git status --porcelain github-analytics.svg) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add github-analytics.svg
            git commit -m "Update GitHub analytics"
            git push
          else
            echo "No changes"
          fi
